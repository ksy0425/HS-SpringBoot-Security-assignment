<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <h3 class="mb-4">상품 수정</h3>

            <form th:action="@{/products/{id}/edit(id=${productId})}"
                  th:object="${productDto}"
                  method="post">

                <!-- 상품명 -->
                <div class="mb-3">
                    <label class="form-label">상품명</label>

                    <input type="text"
                           th:field="*{name}"
                           class="form-control">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <!-- 가격 -->
                <div class="mb-3">
                    <label class="form-label">가격</label>

                    <input type="number"
                           th:field="*{price}"
                           class="form-control">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}">
                    </div>
                </div>

                <!-- 설명 -->
                <div class="mb-3">
                    <label class="form-label">설명</label>

                    <textarea th:field="*{description}"
                              class="form-control"
                              rows="4"></textarea>
                </div>

                <!-- 재고 -->
                <div class="mb-3">
                    <label class="form-label">재고</label>

                    <input type="number"
                           th:field="*{stock}"
                           class="form-control">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}">
                    </div>
                </div>

                <div class="d-flex gap-2">

                    <button type="submit"
                            class="btn btn-primary">
                        수정 완료
                    </button>

                    <a th:href="@{/products}"
                       class="btn btn-secondary">
                        취소
                    </a>

                </div>

            </form>

        </div>
    </div>

</div>

<hr>
<footer style="text-align: center;">
    <p th:text="${'학번: 2171194   |   성명: 김성윤   |   ' + '실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">학번: 2171194   |   성명: 김성윤</p>
</footer>
</body>
</html>
