<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <h3 class="mb-4">비밀번호 변경</h3>

            <form th:action="@{/user/password}"
                  th:object="${passwordChangeDto}"
                  method="post">

                <!-- 현재 비밀번호 -->
                <div class="mb-3">

                    <label class="form-label">현재 비밀번호</label>

                    <input type="password"
                           th:field="*{currentPassword}"
                           class="form-control">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('currentPassword')}"
                         th:errors="*{currentPassword}">
                    </div>

                </div>

                <!-- 새 비밀번호 -->
                <div class="mb-3">

                    <label class="form-label">새 비밀번호</label>

                    <input type="password"
                           th:field="*{newPassword}"
                           class="form-control">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('newPassword')}"
                         th:errors="*{newPassword}">
                    </div>

                </div>

                <!-- 새 비밀번호 확인 -->
                <div class="mb-3">

                    <label class="form-label">
                        새 비밀번호 확인
                    </label>

                    <input type="password"
                           th:field="*{confirmPassword}"
                           class="form-control">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}">
                    </div>

                </div>

                <button type="submit"
                        class="btn btn-primary">
                    비밀번호 변경
                </button>

                <a th:href="@{/home}"
                   class="btn btn-secondary">
                    취소
                </a>

            </form>

        </div>
    </div>

</div>

<hr>

<footer style="text-align: center;">
    <p th:text="${'학번: 2171194 | 성명: 김성윤 | 실습 수행: '
        + #temporals.format(#temporals.createNow(),
        'yyyy-MM-dd HH:mm:ss')}">
    </p>
</footer>

</body>
</html>
